name: clinical_curator_admin
description: Admin console — verification, organizations, audit, RBAC management. Talks to Serverpod exclusively (no local Hive cache).
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cc_core:
    path: ../../packages/core
  cc_ui_kit:
    path: ../../packages/ui_kit
  cc_repositories:
    path: ../../packages/repositories

  # UI + state
  shadcn_flutter: ^0.0.52
  flutter_riverpod: ^2.6.1
  go_router: ^17.1.0
  fl_chart: ^0.70.2
  intl: any

  shared_preferences: ^2.3.2

  # Config — dotenv loaded at startup (see lib/main.dart)
  flutter_dotenv: ^5.2.1

  # Serverpod client
  serverpod_flutter: 3.4.5
  clinical_curator_client:
    path: ../../clinical_curator_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    # Root `.env` shared between clinical + admin.
    - ../../.env
