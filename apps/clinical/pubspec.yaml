name: clinical_curator
description: "FHIR R4 clinical app for Nepal — patient + clinician (doctor/nurse) flows."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  shadcn_flutter: ^0.0.52
  google_fonts: ^6.2.1
  flutter_svg: ^2.2.4
  fl_chart: ^0.70.2

  # Routing
  go_router: ^17.0.0

  # State Management
  flutter_riverpod: ^2.6.1

  # FHIR
  fhir: ^0.12.1

  # Local Database (Hive CE)
  hive_ce: ^2.7.0
  hive_ce_flutter: ^2.1.0

  # Config
  flutter_dotenv: ^5.2.1

  # Persistence
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # Date formatting
  intl: any

  # Offline & Network
  connectivity_plus: ^6.1.4
  dio: ^5.7.0

  # Maps & Location
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Media
  image_picker: ^1.1.2

  # PDF Generation
  pdf: ^3.11.2

  # QR Code
  qr_flutter: ^4.1.0

  # Markdown rendering for in-app user manual
  flutter_markdown_plus: ^1.0.3

  # Backup / sharing / file pick
  share_plus: ^10.1.4
  file_picker: ^8.1.7
  http: ^1.2.2

  # Serverpod
  serverpod_flutter: 3.4.5
  clinical_curator_client:
    path: ../../clinical_curator_client

  # Workspace packages
  cc_core:
    path: ../../packages/core
  cc_fhir_models:
    path: ../../packages/fhir_models
  cc_data:
    path: ../../packages/data
  cc_rbac:
    path: ../../packages/rbac

  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.13
  json_serializable: ^6.7.1
  hive_ce_generator: ^1.6.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    # Root `.env` shared between clinical + admin. Keeps a single source of
    # truth for SERVERPOD_URL so both apps hit the same backend.
    - ../../.env
    # In-app user manuals, rendered by flutter_markdown_plus. Source of
    # truth lives in docs/manual/ so prose can be edited without rebuilding.
    - ../../docs/manual/PATIENT_MANUAL.md
    - ../../docs/manual/CLINICIAN_MANUAL.md
