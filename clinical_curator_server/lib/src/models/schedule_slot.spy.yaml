### Doctor availability schedule slot.
class: ScheduleSlot
table: schedule_slots
fields:
  practitionerRef: String
  date: DateTime
  startTime: String
  endTime: String
  slotDurationMinutes: int
  maxPatients: int
  bookedCount: int
  facilityName: String?
  isEmergencyOverride: bool
  isTelehealth: bool
  status: String
  createdAt: DateTime
  updatedAt: DateTime?
indexes:
  sched_slot_practitioner_idx:
    fields: practitionerRef
  sched_slot_date_idx:
    fields: date
  sched_slot_status_idx:
    fields: status
